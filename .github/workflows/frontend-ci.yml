name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Frontend build and lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        working-directory: ./client
        run: npm ci
      - name: Lint frontend
        working-directory: ./client
        run: npm run lint
      - name: Build frontend
        working-directory: ./client
        run: npm run build
